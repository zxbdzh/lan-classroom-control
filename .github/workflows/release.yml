name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Teacher (教师端)
        run: |
          pyinstaller --noconfirm --onedir --windowed ^
            --name "LanClassroom-Teacher" ^
            --icon "NONE" ^
            --add-data "common;common" ^
            --hidden-import PyQt6 ^
            --hidden-import PyQt6.QtCore ^
            --hidden-import PyQt6.QtGui ^
            --hidden-import PyQt6.QtWidgets ^
            --hidden-import pycryptodome ^
            --hidden-import numpy ^
            --hidden-import mss ^
            --hidden-import PIL ^
            --hidden-import psutil ^
            --collect-all PyQt6 ^
            teacher/main.py

      - name: Build Student (学生端)
        run: |
          pyinstaller --noconfirm --onedir --windowed ^
            --name "LanClassroom-Student" ^
            --icon "NONE" ^
            --add-data "common;common" ^
            --hidden-import PyQt6 ^
            --hidden-import PyQt6.QtCore ^
            --hidden-import PyQt6.QtGui ^
            --hidden-import PyQt6.QtWidgets ^
            --hidden-import pycryptodome ^
            --hidden-import numpy ^
            --hidden-import mss ^
            --hidden-import PIL ^
            --hidden-import psutil ^
            --hidden-import pynput ^
            --collect-all PyQt6 ^
            student/main.py

      - name: Package Teacher
        run: |
          cd dist/LanClassroom-Teacher
          7z a ../../LanClassroom-Teacher.zip .
        shell: cmd

      - name: Package Student
        run: |
          cd dist/LanClassroom-Student
          7z a ../../LanClassroom-Student.zip .
        shell: cmd

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          gh release create $tag `
            ./LanClassroom-Teacher.zip `
            ./LanClassroom-Student.zip `
            --title "Release $tag" `
            --notes-file RELEASE.md
        shell: pwsh
