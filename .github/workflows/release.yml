name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        shell: pwsh
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Teacher (教师端)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onedir --windowed `
            --name LanClassroom-Teacher `
            --add-data "common;common" `
            --hidden-import PyQt5 `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --hidden-import PyQt5.QtWidgets `
            --hidden-import pycryptodome `
            --hidden-import numpy `
            --hidden-import mss `
            --hidden-import PIL `
            --hidden-import psutil `
            --collect-all PyQt5 `
            teacher/main.py

      - name: Build Student (学生端)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onedir --windowed `
            --name LanClassroom-Student `
            --add-data "common;common" `
            --hidden-import PyQt5 `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --hidden-import PyQt5.QtWidgets `
            --hidden-import pycryptodome `
            --hidden-import numpy `
            --hidden-import mss `
            --hidden-import PIL `
            --hidden-import psutil `
            --hidden-import pynput `
            --collect-all PyQt5 `
            student/main.py

      - name: Package Teacher
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/LanClassroom-Teacher/*" -DestinationPath "LanClassroom-Teacher.zip" -Force

      - name: Package Student
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/LanClassroom-Student/*" -DestinationPath "LanClassroom-Student.zip" -Force

      - name: Create Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          gh release create $tag `
            ./LanClassroom-Teacher.zip `
            ./LanClassroom-Student.zip `
            --title "Release $tag" `
            --notes-file RELEASE.md
